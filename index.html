<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Responsive Gallery</h1>

<main>

    <figure>
        <img src="images/img1.jpg" alt="Mountain landscape">
        <figcaption>Beautiful mountain view.</figcaption>
    </figure>

    <figure>
        <img src="images/img2.jpg" alt="Ocean sunset">
        <figcaption>Sunset over the ocean.</figcaption>
    </figure>

    <figure>
        <img src="images/img3.jpg" alt="Forest path">
        <figcaption>Path through a green forest.</figcaption>
    </figure>

    <figure>
        <img src="images/img4.jpg" alt="City skyline">
        <figcaption>Modern city skyline at night.</figcaption>
    </figure>

    <figure>
        <img src="images/img5.jpg" alt="Desert dunes">
        <figcaption>Golden sand dunes in the desert.</figcaption>
    </figure>

    <figure>
        <img src="images/img6.jpg" alt="Snowy mountains">
        <figcaption>Snow-covered mountains.</figcaption>
    </figure>

</main>

</body>
</html>
